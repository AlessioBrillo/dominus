version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 3
    ignore:
      # @types/psl ≥ 1.4.0 is a stub that delegates to psl's own types,
      # but psl's package.json "exports" doesn't expose them under
      # NodeNext resolution — the types become unresolvable.
      # Pin at 1.1.3 which ships real declarations.
      - dependency-name: "@types/psl"
        versions: [">=1.4.0"]
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "frontend"
