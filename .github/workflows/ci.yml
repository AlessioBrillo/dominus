name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    strategy:
      matrix:
        node: [20, 22]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dominus
          POSTGRES_PASSWORD: dominus
          POSTGRES_DB: dominus
        ports:
          - 5432:5432
        options: '--health-cmd "pg_isready -U dominus" --health-interval 5s --health-timeout 5s --health-retries 5'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (with coverage)
        run: npm test -- --coverage

      - name: Security audit
        run: npm audit --audit-level=high

      - name: PostgreSQL connectivity test
        run: >
          node -e "
          const { Pool } = require('pg');
          const pool = new Pool({ connectionString: 'postgresql://dominus:dominus@localhost:5432/dominus' });
          pool.query('SELECT 1 AS ok').then(r => { console.log('PG OK:', r.rows[0].ok); process.exit(0); }).catch(e => { console.error('PG FAIL:', e.message); process.exit(1); });
          "

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Test
        working-directory: ./frontend
        run: npm test

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Security audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
