# DOMINUS — Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: dominus
  labels:
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: dominus
    app.kubernetes.io/component: server
