  #     - NODE_ENV=production
  #     - DATABASE_PATH=/app/data/dominus.db
  #     - LOG_LEVEL=info
  #   entrypoint: ["node", "dist/cli.js", "maintenance", "prune"]
  #   restart: unless-stopped
