# DOMINUS — Reverse proxy configuration for Nginx.
# Place in /etc/nginx/sites-available/dominus and symlink to
# /etc/nginx/sites-enabled/dominus, then reload nginx.
#
# Adapt the server_name, ssl_certificate paths, and HOST to your setup.

upstream dominus_backend {
  # When DOMINUS runs in a Docker container:
  server 127.0.0.1:3000;
  # When DOMINUS runs via systemd:
  # server 127.0.0.1:3000;
  keepalive 64;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name dominus.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name dominus.example.com;

  ssl_certificate     /etc/ssl/certs/dominus.example.com.pem;
  ssl_certificate_key /etc/ssl/private/dominus.example.com.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # Security headers
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options DENY;
  add_header X-XSS-Protection "0";
  add_header Strict-Transport-Security "max-age=63072000" always;

  # Rate limiting zone (shared across workers)
  limit_req_zone $binary_remote_addr zone=dominus:10m rate=10r/s;

  location / {
    proxy_pass http://dominus_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rate limit application
    limit_req zone=dominus burst=20 nodelay;

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    30s;
  }

  location /api/health {
    # No rate limiting for health checks
    proxy_pass http://dominus_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Static assets (if any frontend is added later)
  location /static/ {
    root /var/www/dominus;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
